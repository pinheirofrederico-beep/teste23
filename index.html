<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra Realista</title>
    <style>
        body {
            background-color: #020205; /* Preto espacial */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .terra-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            /* Brilho azul para simular a atmosfera */
            box-shadow: 0 0 60px rgba(50, 150, 255, 0.6);
            /* Animação de rotação */
            animation: girar 20s linear infinite;
        }

        /* Criando a animação de giro */
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <h1>Nosso Planeta</h1>
    <h1>PLANETA TERRA</h1> 
    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=800&q=80" alt="Planeta Terra visto do espaço">
    </div>

</body>
</html>
