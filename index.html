<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra Realista</title>
    <style>
        body {
            background-color: #020205; /* Preto espacial */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .terra-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            /* Brilho azul para simular a atmosfera */
            box-shadow: 0 0 60px rgba(50, 150, 255, 0.6);
            /* Animação de rotação */
            animation: girar 20s linear infinite;
        }

        /* Criando a animação de giro */
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

   
    <h1>PLANETA TERRA</h1> 
    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=800&q=80" alt="Planeta Terra visto do espaço">
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Substitua a URL abaixo por uma imagem do seu sistema solar preferida */
            background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; /* Faz a imagem cobrir a tela toda */
            background-position: center; /* Centraliza a imagem */
            background-attachment: fixed; /* Trava o fundo ao rolar a página */
            background-repeat: no-repeat;
            background-color: #000; /* Cor de segurança caso a imagem falhe */
            
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.6); /* Fundo semi-transparente para o texto */
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px); /* Efeito de vidro desfocado */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema Solar</h1>
        <p>Explore as maravilhas do cosmos.</p>
    </div>

</body>
</html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nave vs Asteroides</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: 2px solid #333;
        }

        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: cyan;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .bullet {
            position: absolute;
            width: 7px;
            height: 15px;
            background: red;
            border-radius: 2px;
        }

        .asteroid {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #888;
            border-radius: 50%;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 15px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="score">Pontos: 0</div>
    <div id="game-container">
        <div id="player"></div>
    </div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    
    let score = 0;
    let playerX = window.innerWidth / 2;

    // Movimentação do Mouse
    window.addEventListener('mousemove', (e) => {
        playerX = e.clientX;
        player.style.left = playerX + 'px';
    });

    // Atirar ao clicar
    window.addEventListener('click', () => {
        const bullet = document.createElement('div');
        bullet.classList.add('bullet');
        bullet.style.left = (playerX - 2) + 'px';
        bullet.style.bottom = '60px';
        container.appendChild(bullet);

        // Lógica do movimento do tiro
        let bulletMove = setInterval(() => {
            let bBottom = parseInt(bullet.style.bottom);
            bullet.style.bottom = (bBottom + 10) + 'px';

            // Remover tiro se sair da tela
            if (bBottom > window.innerHeight) {
                bullet.remove();
                clearInterval(bulletMove);
            }

            // Colisão com asteroides
            const asteroids = document.querySelectorAll('.asteroid');
            asteroids.forEach(ast => {
                if (isColliding(bullet, ast)) {
                    ast.remove();
                    bullet.remove();
                    clearInterval(bulletMove);
                    score += 10;
                    scoreElement.innerText = `Pontos: ${score}`;
                }
            });
        }, 20);
    });

    // Gerar Asteroides
    setInterval(() => {
        const asteroid = document.createElement('div');
        asteroid.classList.add('asteroid');
        asteroid.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        asteroid.style.top = '-50px';
        container.appendChild(asteroid);

        let astMove = setInterval(() => {
            let aTop = parseInt(asteroid.style.top);
            asteroid.style.top = (aTop + 5) + 'px';

            if (aTop > window.innerHeight) {
                asteroid.remove();
                clearInterval(astMove);
            }

            // Game Over simples (colisão com player)
            if (isColliding(player, asteroid)) {
                alert("Game Over! Pontos: " + score);
                location.reload(2);
            }
        }, 30);
    }, 1000);

    // Função de Detecção de Colisão
    function isColliding(a, b) {
        let aRect = a.getBoundingClientRect();
        let bRect = b.getBoundingClientRect();
        return !(
            aRect.top > bRect.bottom ||
            aRect.bottom < bRect.top ||
            aRect.right < bRect.left ||
            aRect.left > bRect.right
        );
    }
</script>
</body>
</html>
