<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra Realista</title>
    <style>
        body {
            background-color: #020205; /* Preto espacial */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .terra-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            /* Brilho azul para simular a atmosfera */
            box-shadow: 0 0 60px rgba(50, 150, 255, 0.6);
            /* Animação de rotação */
            animation: girar 20s linear infinite;
        }

        /* Criando a animação de giro */
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

   
    <h1>PLANETA TERRA</h1> 
    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=800&q=80" alt="Planeta Terra visto do espaço">
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Substitua a URL abaixo por uma imagem do seu sistema solar preferida */
            background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; /* Faz a imagem cobrir a tela toda */
            background-position: center; /* Centraliza a imagem */
            background-attachment: fixed; /* Trava o fundo ao rolar a página */
            background-repeat: no-repeat;
            background-color: #000; /* Cor de segurança caso a imagem falhe */
            
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.6); /* Fundo semi-transparente para o texto */
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px); /* Efeito de vidro desfocado */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema Solar</h1>
        <p>Explore as maravilhas do cosmos.</p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Asteroid Destroyer</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* O Botão Inicial */
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ff0055, #7000ff);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.5);
            transition: transform 0.2s;
        }
        #start-btn:hover { transform: scale(1.1); }

        /* Tela do Jogo */
        #game-container { display: none; position: relative; }
        canvas { background: #000; border: 2px solid #333; cursor: crosshair; }
        #score { position: absolute; top: 10px; left: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="startGame()">INICIAR MISSÃO ESPACIAL</button>

    <div id="game-container">
        <div id="score">Pontos: 0</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const gameContainer = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let ship, bullets, asteroids, animationId;

        function startGame() {
            startBtn.style.display = 'none';
            gameContainer.style.display = 'block';
            canvas.width = 800;
            canvas.height = 600;
            
            ship = { x: canvas.width/2, y: canvas.height - 50, w: 30, h: 30 };
            bullets = [];
            asteroids = [];
            score = 0;
            
            spawnAsteroids();
            update();
        }

        // Lógica de movimento e tiro
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            ship.x = e.clientX - rect.left - ship.w/2;
        });

        window.addEventListener('mousedown', () => {
            bullets.push({ x: ship.x + ship.w/2, y: ship.y, speed: 7 });
        });

        function spawnAsteroids() {
            setInterval(() => {
                asteroids.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    size: 20 + Math.random() * 30,
                    speed: 2 + Math.random() * 3
                });
            }, 1000);
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Nave (Triângulo)
            ctx.fillStyle = '#00f2ff';
            ctx.beginPath();
            ctx.moveTo(ship.x + ship.w/2, ship.y);
            ctx.lineTo(ship.x, ship.y + ship.h);
            ctx.lineTo(ship.x + ship.w, ship.y + ship.h);
            ctx.fill();

            // Balas
            bullets.forEach((b, i) => {
                b.y -= b.speed;
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(b.x - 2, b.y, 4, 10);
                if(b.y < 0) bullets.splice(i, 1);
            });

            // Asteroides
            asteroids.forEach((a, i) => {
                a.y += a.speed;
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
                ctx.fill();

                // Colisão Bala vs Asteroide
                bullets.forEach((b, bi) => {
                    let dist = Math.hypot(b.x - a.x, b.y - a.y);
                    if(dist < a.size) {
                        asteroids.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreElement.innerText = `Pontos: ${score}`;
                    }
                });

                // Game Over básico
                if(a.y > canvas.height) {
                    alert("Fim de jogo! Pontuação: " + score);
                    location.reload();
                }
            });

            animationId = requestAnimationFrame(update);
        }
    </script>
</body>
</html>
