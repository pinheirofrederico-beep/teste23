<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra Realista</title>
    <style>
        body {
            background-color: #020205; /* Preto espacial */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .terra-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            /* Brilho azul para simular a atmosfera */
            box-shadow: 0 0 60px rgba(50, 150, 255, 0.6);
            /* Animação de rotação */
            animation: girar 20s linear infinite;
        }

        /* Criando a animação de giro */
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

   
    <h1>PLANETA TERRA</h1> 
    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=800&q=80" alt="Planeta Terra visto do espaço">
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Substitua a URL abaixo por uma imagem do seu sistema solar preferida */
            background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; /* Faz a imagem cobrir a tela toda */
            background-position: center; /* Centraliza a imagem */
            background-attachment: fixed; /* Trava o fundo ao rolar a página */
            background-repeat: no-repeat;
            background-color: #000; /* Cor de segurança caso a imagem falhe */
            
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.6); /* Fundo semi-transparente para o texto */
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px); /* Efeito de vidro desfocado */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema Solar</h1>
        <p>Explore as maravilhas do cosmos.</p>
    </div>

</body>
</html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Missão Espacial</title>
    <style>
        body {
            margin: 0;
            background: #020205;
            color: white;

            overflow: hidden;
            user-select: none;
        }

        #game-canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveStar linear infinite;

        @keyframes moveStar {
            from { transform: translateY(-10vh); }
            to { transform: translateY(110vh); }
        }

        #rocket {
            position: absolute;
            font-size: 50px;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
            cursor: none;
        }

        .laser {
            position: absolute;
            width: 4px;
            height: 20px;
            background: #ff004c;
            box-shadow: 0 0 10px #ff004c;
            border-radius: 5px;
        }

        .asteroid {
            position: absolute;
            font-size: 40px;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">SCORE: 000</div>

     <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Foguete Turbo - Auto Fire</title>
    <style>
        body {
            margin: 0;
            background: #020205;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at bottom, #1b2735 0%, #090a0f 100%);
            display: none; /* Escondido até o start */
        }

        /* Tela Inicial */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 100;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #ff004c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff004c;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveStar linear infinite;
        }

        @keyframes moveStar {
            from { transform: translateY(-10vh); }
            to { transform: translateY(110vh); }
        }

        #rocket {
            position: absolute;
            font-size: 50px;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-shadow: 0 10px 10px rgba(255, 165, 0, 0.5);
        }

        /* Foguinho do foguete */
        #rocket::after {
            content: '🔥';
            position: absolute;
            font-size: 20px;
            bottom: -15px;
            left: 15px;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .laser {
            position: absolute;
            width: 4px;
            height: 20px;
            background: #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
            border-radius: 5px;
        }

        .asteroid { position: absolute; font-size: 40px; }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>🚀 FOGUETE TURBO</h1>
        <p>Desvie dos meteoros e destrua tudo!</p>
        <button onclick="startGame()">Iniciar Missão</button>
    </div>

    <div id="game-canvas">
        <div id="score">PONTOS: 0</div>
        <div id="rocket">🚀</div>
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const startScreen = document.getElementById('start-screen');
    const rocket = document.getElementById('rocket');
    const scoreDisplay = document.getElementById('score');
    
    let score = 0;
    let gameActive = false;
    let rocketX = window.innerWidth / 2;

    // Inicia o Jogo
    function startGame() {
        startScreen.style.display = 'none';
        canvas.style.display = 'block';
        gameActive = true;
        
        // Começa a atirar automaticamente
        setInterval(autoFire, 200);
        // Começa a gerar inimigos
        setInterval(spawnAsteroid, 700);
    }

    // Movimento do Mouse
    window.addEventListener('mousemove', (e) => {
        if(!gameActive) return;
        rocketX = e.clientX;
        rocket.style.left = (rocketX - 25) + 'px';
    });

    // Função de Tiro Automático
    function autoFire() {
        if(!gameActive) return;

        const laser = document.createElement('div');
        laser.className = 'laser';
        laser.style.left = (rocketX - 2) + 'px';
        laser.style.bottom = '90px';
        canvas.appendChild(laser);

        const moveLaser = setInterval(() => {
            let bottom = parseInt(laser.style.bottom);
            laser.style.bottom = (bottom + 15) + 'px';

            if (bottom > window.innerHeight) {
                laser.remove();
                clearInterval(moveLaser);
            }

            document.querySelectorAll('.asteroid').forEach(ast => {
                if (checkCollision(laser, ast)) {
                    createExplosion(ast.offsetLeft, ast.offsetTop);
                    ast.remove();
                    laser.remove();
                    clearInterval(moveLaser);
                    score += 10;
                    scoreDisplay.innerText = `PONTOS: ${score}`;
                }
            });
        }, 10);
    }

    // Criar Asteroides
    function spawnAsteroid() {
        if(!gameActive) return;

        const ast = document.createElement('div');
        ast.className = 'asteroid';
        ast.innerHTML = ['☄️', '🌑', '👾'][Math.floor(Math.random() * 3)];
        ast.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        ast.style.top = '-60px';
        canvas.appendChild(ast);

        const moveAst = setInterval(() => {
            if(!gameActive) { clearInterval(moveAst); return; }
            
            let top = parseInt(ast.style.top);
            ast.style.top = (top + 5) + 'px';

            if (top > window.innerHeight) {
                ast.remove();
                clearInterval(moveAst);
            }

            if (checkCollision(rocket, ast)) {
                gameActive = false;
                alert("MISSÃO ABORTADA! Pontuação final: " + score);
                location.reload();
            }
        }, 20);
    }

    // Criar Estrelas
    for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = Math.random() * 3 + 'px';
        star.style.height = star.style.width;
        star.style.left = Math.random() * 100 + 'vw';
        star.style.animationDuration = (Math.random() * 3 + 1) + 's';
        document.body.appendChild(star);
    }

    function checkCollision(a, b) {
        const r1 = a.getBoundingClientRect();
        const r2 = b.getBoundingClientRect();
        return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
    }

    function createExplosion(x, y) {
        const exp = document.createElement('div');
        exp.style.position = 'absolute';
        exp.style.left = x + 'px';
        exp.style.top = y + 'px';
        exp.innerHTML = '💥';
        exp.style.fontSize = '40px';
        canvas.appendChild(exp);
        setTimeout
