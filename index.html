<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra</title>
    <style>
        /* O CSS começa aqui */
        body {
            background-color: #050505; /* Fundo escuro como o espaço */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        img {
            max-width: 80%;
            height: auto;
            border-radius: 50%; /* Deixa a borda arredondada */
            box-shadow: 0 0 50px rgba(0, 150, 255, 0.4); /* Brilho azul suave */
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.5s ease;
        }

        img:hover {
            transform: scale(1.05); /* Efeito de zoom ao passar o mouse */
        }

        h1 {
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Planeta Terra</h1>
        <img src="https://lh3.googleusercontent.com/image_generation_content/0" alt="https://lh3.googleusercontent.com/image_generation_content/0">
    </div>

</body>
</html>
