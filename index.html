<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra Realista</title>
    <style>
        body {
            background-color: #020205; /* Preto espacial */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .terra-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            /* Brilho azul para simular a atmosfera */
            box-shadow: 0 0 60px rgba(50, 150, 255, 0.6);
            /* Animação de rotação */
            animation: girar 20s linear infinite;
        }

        /* Criando a animação de giro */
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

   
    <h1>PLANETA TERRA</h1> 
    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=800&q=80" alt="Planeta Terra visto do espaço">
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Substitua a URL abaixo por uma imagem do seu sistema solar preferida */
            background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; /* Faz a imagem cobrir a tela toda */
            background-position: center; /* Centraliza a imagem */
            background-attachment: fixed; /* Trava o fundo ao rolar a página */
            background-repeat: no-repeat;
            background-color: #000; /* Cor de segurança caso a imagem falhe */
            
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.6); /* Fundo semi-transparente para o texto */
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px); /* Efeito de vidro desfocado */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema Solar</h1>
        <p>Explore as maravilhas do cosmos.</p>
    </div>

</body>
</html>

<button class="meu-botao">Passe o mouse aqui</button>

<style>
  .meu-botao {
    /* Estilo Base */
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    color: #ffffff;
    background-color: #3498db;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    
    /* A Mágica da Transição */
    /* Faz a cor de fundo e o tamanho mudarem em 0.3 segundos */
    transition: background-color 0.3s ease, transform 0.2s ease;
  }

  /* Estado quando o mouse passa por cima */
  .meu-botao:hover {
    background-color: #2980b9; /* Escurece um pouco */
    transform: scale(1.05);    /* Aumenta levemente o tamanho */
  }

  /* Estado quando o botão é clicado */
  .meu-botao:active {
    transform: scale(0.95);    /* Efeito de "apertar" */
  }
</style> 

<button id="theme-toggle" class="theme-btn">
  <span class="icon">🌙</span>
  <span class="text">Modo Escuro</span>
</button>

<style>
  /* 1. Definição das Cores (Variáveis) */
  :root {
    --bg-color: #f0f2f5;
    --text-color: #1c1e21;
    --btn-bg: #ffffff;
    --btn-shadow: rgba(0, 0, 0, 0.1);
  }

  /* 2. Cores para o Modo Escuro */
  [data-theme="dark"] {
    --bg-color: #18191a;
    --text-color: #e4e6eb;
    --btn-bg: #3a3b3c;
    --btn-shadow: rgba(0, 0, 0, 0.3);
  }

  /* Aplicação das variáveis no corpo da página */
  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: background-color 0.4s ease, color 0.4s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
  }

  /* 3. Estilização do Botão */
  .theme-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    background-color: var(--btn-bg);
    color: var(--text-color);
    cursor: pointer;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px var(--btn-shadow);
    
    /* Transição suave em todas as propriedades */
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .theme-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--btn-shadow);
  }

  .theme-btn:active {
    transform: scale(0.95);
  }
</style>

<script>
  const btn = document.getElementById('theme-toggle');
  const icon = btn.querySelector('.icon');
  const text = btn.querySelector('.text');

  btn.addEventListener('click', () => {
    // Alterna o atributo no <html> ou <body>
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    
    document.documentElement.setAttribute('data-theme', newTheme);
    
    // Altera o ícone e o texto dinamicamente
    icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    text.textContent = newTheme === 'dark' ? 'Modo Claro' : 'Modo Escuro';
  });
</script>
