<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra Realista</title>
    <style>
        body {
            background-color: #020205; /* Preto espacial */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem */
        }

        .terra-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            /* Brilho azul para simular a atmosfera */
            box-shadow: 0 0 60px rgba(50, 150, 255, 0.6);
            /* Animação de rotação */
            animation: girar 20s linear infinite;
        }

        /* Criando a animação de giro */
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

   
    <h1>PLANETA TERRA</h1> 
    <div class="terra-container">
        <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=800&q=80" alt="Planeta Terra visto do espaço">
    </div>

</body>
</html>

<!DOCTYPE html>

            margin: 0;

            background-color: #000; /* Cor de segurança caso a imagem falhe */

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            align-items: center;

            background: rgba(0, 0, 0, 0.6); /* Fundo semi-transparente para o texto */

            border-radius: 15px;

<!DOCTYPE html>

            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #555;
            background-color: #000;
        }
        .instrucoes {
            position: absolute;
            top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 800;

    // Configurações da Nave
    const ship = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        r: 15,
        a: 90 / 180 * Math.PI, // convertendo para radianos
        rot: 0,
        thrusting: false,
        thrust: { x: 0, y: 0 },
        bullets: []
    };

    // Asteroides
    let rochas = [];
    for (let i = 0; i < 5; i++) {
        rochas.push(novaRocha());
    }

    function novaRocha() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            xv: (Math.random() - 0.5) * 2,
            yv: (Math.random() - 0.5) * 2,
            r: 30 + Math.random() * 20
        };
    }

    // Loop do Jogo
    function update() {
        // 1. Desenhar Fundo
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Mover e Desenhar Nave
        if (ship.thrusting) {
            ship.thrust.x += 0.1 * Math.cos(ship.a);
            ship.thrust.y -= 0.1 * Math.sin(ship.a);
        } else {
            ship.thrust.x *= 0.99; // Fricção leve
            ship.thrust.y *= 0.99;
        }

        ship.x += ship.thrust.x;
        ship.y += ship.thrust.y;
        ship.a += ship.rot;

        // Limites da tela (teletransporte)
        if (ship.x < 0) ship.x = canvas.width;
        if (ship.x > canvas.width) ship.x = 0;
        if (ship.y < 0) ship.y = canvas.height;
        if (ship.y > canvas.height) ship.y = 0;

        desenharNave();

        // 3. Mover e Desenhar Tiros
        for (let i = ship.bullets.length - 1; i >= 0; i--) {
            let b = ship.bullets[i];
            b.x += b.xv;
            b.y += b.yv;

            // Desenhar tiro
            ctx.fillStyle = "salmon";
            ctx.beginPath();
            ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
            ctx.fill();

            // Remover tiro se sair da tela
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                ship.bullets.splice(i, 1);
            }
        }

        // 4. Mover e Desenhar Asteroides
        ctx.strokeStyle = "white";
        ctx.lineWidth = 1.5;
        for (let r of rochas) {
            r.x += r.xv;
            r.y += r.yv;

            // Loop de borda para rochas
            if (r.x < -r.r) r.x = canvas.width + r.r;
            if (r.x > canvas.width + r.r) r.x = -r.r;
            if (r.y < -r.r) r.y = canvas.height + r.r;
            if (r.y > canvas.height + r.r) r.y = -r.r;

            ctx.beginPath();
            ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
            ctx.stroke();

            // Colisão Tiro vs Asteroide
            for (let i = ship.bullets.length - 1; i >= 0; i--) {
                let b = ship.bullets[i];
                let dist = Math.sqrt((r.x - b.x)**2 + (r.y - b.y)**2);
                if (dist < r.r) {
                    rochas.splice(rochas.indexOf(r), 1);
                    ship.bullets.splice(i, 1);
                    rochas.push(novaRocha()); // Cria um novo para manter o jogo
                    break;
                }
            }
        }

        requestAnimationFrame(update);
    }
